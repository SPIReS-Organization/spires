# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

# Umbrella docs: narrative + family map only. We do NOT import or autodoc any
# sub-package here (each package hosts its own API reference), so the build is
# light — no package install, no C++ mocking.
sphinx:
  configuration: doc/source/conf.py
  fail_on_warning: false

formats:
  - pdf
  - epub

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    post_checkout:
      # Fetch full git history for setuptools_scm version detection
      - git fetch --unshallow || true

python:
  install:
    - requirements: doc/requirements.txt
